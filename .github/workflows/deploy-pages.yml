# Deploys the site to GitHub Pages on every push to main.
# This replaces GitHub's legacy Jekyll build pipeline (which kept
# stalling) — the files are uploaded exactly as-is, no processing.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual re-runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; latest push wins
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
