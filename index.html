<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaHub — Movies, Games &amp; TV Shows</title>
  <!-- ?v= is a cache-buster: bump it when deploying big changes so
       browsers/CDNs can't serve stale copies of these files -->
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>

  <!-- ============================================================
       NAVBAR (sticky)
       To add a section link: add another <a> with a data-section
       value matching a key in API_SECTIONS (top of script.js).
       ============================================================ -->
  <header class="navbar">
    <div class="navbar-inner">
      <a href="#" class="brand" id="brand">
        <span class="brand-icon">▶</span> MediaHub
      </a>

      <nav class="nav-links" id="navLinks">
        <a href="#" class="nav-link active" data-section="movies">Movies</a>
        <a href="#" class="nav-link" data-section="games">Games</a>
        <a href="#" class="nav-link" data-section="tvshows">TV Shows</a>
      </nav>

      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search this section…"
          autocomplete="off"
        />
      </div>
    </div>
  </header>

  <!-- ============================================================
       MAIN CONTENT
       Hero banners, filter buttons, and card grids are generated
       by script.js from live TMDB/RAWG API data — nothing to edit
       here when changing sections or categories.
       ============================================================ -->
  <main id="app">
    <!-- Hero banner for the active section -->
    <section class="hero" id="hero"></section>

    <!-- Category filter buttons for the active section -->
    <div class="filters" id="filters"></div>

    <!-- Card grid for the active section -->
    <section class="grid" id="grid"></section>

    <!-- Shown when search/filter matches nothing -->
    <p class="empty-state hidden" id="emptyState">
      No results found. Try a different search or category.
    </p>

    <!-- Pagination: count + Load More -->
    <div class="load-more-wrap hidden" id="loadMoreWrap">
      <p class="load-more-count" id="loadMoreCount"></p>
      <button class="load-more" id="loadMoreBtn" type="button">Load More</button>
    </div>
  </main>

  <!-- ============================================================
       MODAL (detail view — populated by script.js on card click)
       ============================================================ -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-body">
        <img class="modal-image" id="modalImage" src="" alt="" />
        <div class="modal-info">
          <span class="card-tag" id="modalCategory"></span>
          <h2 id="modalTitle"></h2>
          <div class="modal-meta">
            <span id="modalMeta"></span>
            <span class="rating" id="modalRating"></span>
          </div>
          <!-- Genres/platforms line, description, then link rows:
               games get prices + store links, movies/TV get cinema
               showtimes + streaming providers + TMDB links -->
          <p class="modal-platforms" id="modalPlatforms"></p>
          <p id="modalDescription"></p>
          <div class="modal-stores" id="modalStores"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>MediaHub — built with plain HTML, CSS &amp; JavaScript</p>
  </footer>

  <!-- All content loads live from the TMDB and RAWG APIs — config
       and section definitions are at the top of script.js.
       (?v= cache-buster: keep in sync with the stylesheet above) -->
  <script src="script.js?v=4"></script>
</body>
</html>
