<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fliqora — Movies, Games &amp; TV Shows</title>
  <meta name="description" content="Fliqora — discover movies, games and TV shows: where to stream, where to buy, and what's worth your time." />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="canonical" href="https://alexanderbruun4-coder.github.io/media-hub/" />

  <!-- Social link previews (Discord, Twitter/X, iMessage…) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Fliqora" />
  <meta property="og:title" content="Fliqora — Movies, Games &amp; TV Shows" />
  <meta property="og:description" content="Discover movies, games and TV shows: where to stream, where to buy, and what's worth your time." />
  <meta property="og:url" content="https://alexanderbruun4-coder.github.io/media-hub/" />
  <meta property="og:image" content="https://alexanderbruun4-coder.github.io/media-hub/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Typography: Inter (recommended by the design system for streaming platforms) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- ?v= is a cache-buster: bump it when deploying big changes so
       browsers/CDNs can't serve stale copies of these files -->
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>

  <!-- ============================================================
       NAVBAR (sticky, glassmorphism, sliding active pill)
       To add a section link: add another <a> with a data-section
       value matching a key in API_SECTIONS (top of script.js).
       ============================================================ -->
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="#" class="brand" id="brand" aria-label="Fliqora home">
        <span class="brand-icon" aria-hidden="true">
          <!-- Four-point spark: Fliqora's "flick of light" mark -->
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 1.5c.9 5.6 3.9 8.6 9.5 9.5-5.6.9-8.6 3.9-9.5 9.5-.9-5.6-3.9-8.6-9.5-9.5 5.6-.9 8.6-3.9 9.5-9.5Z"/>
          </svg>
        </span>
        <span class="brand-name">Fliqora</span>
      </a>

      <nav class="nav-links" id="navLinks" aria-label="Sections">
        <span class="nav-pill" id="navPill" aria-hidden="true"></span>
        <a href="#" class="nav-link active" data-section="home">Home</a>
        <a href="#" class="nav-link" data-section="movies">Movies</a>
        <a href="#" class="nav-link" data-section="games">Games</a>
        <a href="#" class="nav-link" data-section="tvshows">TV Shows</a>
        <a href="#" class="nav-link" data-section="mylist">My List</a>
      </nav>

      <div class="search-wrap">
        <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
        </svg>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search this section…"
          autocomplete="off"
          aria-label="Search"
        />
      </div>
    </div>
  </header>

  <!-- ============================================================
       MAIN CONTENT
       Hero, home rows, filter buttons, and card grids are generated
       by script.js from live TMDB/RAWG API data — nothing to edit
       here when changing sections or categories.
       ============================================================ -->
  <main id="app">
    <!-- Hero: rotating spotlight on Home, featured banner elsewhere -->
    <section class="hero" id="hero" aria-live="polite"></section>

    <!-- Home landing rows (Trending Games / Popular Movies / TV) -->
    <div class="home-rows hidden" id="homeRows"></div>

    <!-- Category filter buttons for the active section -->
    <div class="filters" id="filters" role="tablist" aria-label="Categories"></div>

    <!-- Card grid for the active section -->
    <section class="grid" id="grid"></section>

    <!-- Shown when search/filter matches nothing -->
    <p class="empty-state hidden" id="emptyState">
      No results found. Try a different search or category.
    </p>

    <!-- Pagination: count + Load More -->
    <div class="load-more-wrap hidden" id="loadMoreWrap">
      <p class="load-more-count" id="loadMoreCount"></p>
      <button class="load-more" id="loadMoreBtn" type="button">Load More</button>
    </div>
  </main>

  <!-- ============================================================
       MODAL (rich detail view — populated by script.js on card
       click: cinematic backdrop on top, poster + info layered
       below, then link/price/provider rows)
       ============================================================ -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modalBox" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>

      <!-- Wide backdrop image with a fade into the modal surface -->
      <div class="modal-hero" aria-hidden="true">
        <img class="modal-backdrop-img" id="modalBackdrop" src="" alt="" />
      </div>

      <div class="modal-body">
        <img class="modal-image" id="modalImage" src="" alt="" />
        <div class="modal-info">
          <span class="card-tag" id="modalCategory"></span>
          <h2 id="modalTitle"></h2>
          <div class="modal-meta">
            <span id="modalMeta"></span>
            <span class="rating" id="modalRating"></span>
          </div>
          <!-- Genres/platforms line, description, then link rows:
               games get prices + store links, movies/TV get cinema
               showtimes + streaming providers + TMDB links -->
          <p class="modal-platforms" id="modalPlatforms"></p>
          <p class="modal-description" id="modalDescription"></p>
          <div class="modal-stores" id="modalStores"></div>
        </div>
      </div>

      <!-- Screenshots gallery + similar titles (filled async) -->
      <div class="modal-extra" id="modalExtra"></div>
    </div>
  </div>

  <!-- Fades in after scrolling down -->
  <button class="back-to-top" id="backToTop" type="button" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5m-6 6 6-6 6 6"/></svg>
  </button>

  <!-- Hidden file input for importing a saved My List JSON file -->
  <input type="file" id="importInput" accept=".json,application/json" hidden />

  <footer class="footer">
    <p>Fliqora — movies, games &amp; TV in one place</p>
    <p class="footer-credits">
      Game data provided by <a href="https://rawg.io" target="_blank" rel="noopener noreferrer">RAWG</a>
      · Movie &amp; TV data from <a href="https://www.themoviedb.org" target="_blank" rel="noopener noreferrer">TMDB</a>
    </p>
  </footer>

  <!-- All content loads live from the TMDB and RAWG APIs — config
       and section definitions are at the top of script.js.
       (?v= cache-buster: keep in sync with the stylesheet above) -->
  <script src="script.js?v=10"></script>
</body>
</html>
